<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lolo Travels — Member Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Gilda+Display&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A6B;
    --gold:#D4A830;
    --periwinkle:#7B82C9;
    --cream:#F7F4EE;
    --black:#0E0E1A;
    --font-h:'Gilda Display', serif;
    --font-s:'Cormorant Garamond', serif;
    --font-b:'Jost', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--font-b);
    background:var(--cream);
    color:var(--black);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* Top bar */
  header{
    padding:32px 48px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom:1px solid rgba(27,42,107,.08);
  }
  header a.brand{
    font-family:var(--font-h);
    font-size:1.4rem;
    color:var(--navy);
    text-decoration:none;
    letter-spacing:.04em;
  }

  /* Main */
  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 24px;
  }
  .card{
    width:100%;
    max-width:440px;
    background:#fff;
    border:1px solid rgba(27,42,107,.08);
    padding:56px 44px;
    border-radius:2px;
    box-shadow:0 1px 40px rgba(27,42,107,.04);
  }
  .card h1{
    font-family:var(--font-h);
    font-weight:400;
    font-size:2rem;
    color:var(--navy);
    text-align:center;
    margin-bottom:8px;
    letter-spacing:.02em;
  }
  .card .sub{
    font-family:var(--font-s);
    font-style:italic;
    font-size:1rem;
    color:rgba(27,42,107,.55);
    text-align:center;
    margin-bottom:40px;
  }

  label{
    display:block;
    font-size:.7rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--navy);
    margin-bottom:8px;
    font-weight:400;
  }
  input{
    width:100%;
    padding:14px 16px;
    border:1px solid rgba(27,42,107,.18);
    background:#fff;
    font-family:var(--font-b);
    font-size:.95rem;
    color:var(--black);
    margin-bottom:24px;
    border-radius:2px;
    transition:border-color .2s;
  }
  input:focus{
    outline:none;
    border-color:var(--gold);
  }

  .row-between{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:32px;
    margin-top:-8px;
  }
  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:.78rem;
    color:rgba(27,42,107,.7);
  }
  .remember input{
    width:auto;
    margin:0;
  }
  .forgot{
    font-size:.78rem;
    color:var(--navy);
    text-decoration:none;
    letter-spacing:.02em;
  }
  .forgot:hover{color:var(--gold);}

  button.primary{
    width:100%;
    padding:16px;
    background:var(--navy);
    color:#fff;
    border:none;
    font-family:var(--font-b);
    font-size:.78rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background .25s;
    border-radius:2px;
  }
  button.primary:hover{background:var(--gold);color:var(--navy);}

  .signup{
    margin-top:32px;
    text-align:center;
    font-size:.85rem;
    color:rgba(27,42,107,.7);
    font-family:var(--font-s);
  }
  .signup a{
    color:var(--navy);
    font-weight:500;
    text-decoration:none;
    letter-spacing:.02em;
    margin-left:4px;
  }
  .signup a:hover{color:var(--gold);}

  .divider{
    height:1px;
    background:rgba(27,42,107,.1);
    margin:32px 0;
  }

  footer{
    padding:24px;
    text-align:center;
    font-family:var(--font-s);
    font-size:.85rem;
    font-style:italic;
    color:rgba(27,42,107,.5);
  }
  footer a{color:rgba(27,42,107,.7);text-decoration:none;}
  footer a:hover{color:var(--gold);}

  @media (max-width:520px){
    .card{padding:40px 28px;}
    .card h1{font-size:1.7rem;}
    header{padding:24px;}
  }
</style>
</head>
<body>

<header>
  <a class="brand" href="/">Lolo Travels</a>
</header>

<main>
  <div class="card">
    <h1>Sign In</h1>
    <p class="sub">Welcome back</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com">

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">

    <div class="row-between">
      <label class="remember"><input type="checkbox"> Remember me</label>
      <a class="forgot" href="#">Forgot password?</a>
    </div>

    <button class="primary" type="button">Sign In</button>

    <div class="divider"></div>

    <p class="signup">New to Lolo? <a href="#">Create an account</a></p>
  </div>
</main>

<footer>
  <a href="/">Return to lolotravels.com</a>
</footer>

</body>
</html>
