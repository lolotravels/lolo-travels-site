name: Process Team Invitations
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  process:
    runs-on: ubuntu-latest
    env:
      SB_TOKEN: ${{ secrets.SUPABASE_SERVICE_TOKEN }}
      SB_PROJECT: hktntiamtpptcagnohnn
      RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Process invitations
        run: |
          pip install requests -q
          python3 -c "
import requests, json, random, string, os
T=os.environ['SB_TOKEN']; P=os.environ['SB_PROJECT']; R=os.environ['RESEND_KEY']
def sb(q):
    return requests.post('https://api.supabase.com/v1/projects/'+P+'/database/query',headers={'Authorization':'Bearer '+T,'Content-Type':'application/json'},json={'query':q}).json()
invs=sb(\"SELECT ti.*, c.name as cn FROM public.team_invitations ti LEFT JOIN public.companies c ON c.id=ti.company_id WHERE ti.status='pending' ORDER BY ti.created_at LIMIT 10\")
if not isinstance(invs,list) or not invs: exit(0)
for i in invs:
    em=i['invitee_email']; nm=(i.get('invitee_name') or em.split('@')[0]); rl=i.get('portal_role','sales'); cid=i['company_id']; iid=i['id']
    pw='Lolo'+''.join(random.choices(string.ascii_letters+string.digits,k=6))+'!'
    ex=sb(\"SELECT id FROM auth.users WHERE email='\"+em+\"'\")
    if not ex or not isinstance(ex,list): sb(\"INSERT INTO auth.users (id,email,encrypted_password,email_confirmed_at,role,aud,created_at,updated_at) VALUES (uuid_generate_v4(),'\"+em+\"',crypt('\"+pw+\"',gen_salt('bf')),now(),'authenticated','authenticated',now(),now())\")
    else: sb(\"UPDATE auth.users SET encrypted_password=crypt('\"+pw+\"',gen_salt('bf')) WHERE email='\"+em+\"'\")
    u=sb(\"SELECT id FROM auth.users WHERE email='\"+em+\"'\")
    if not u or not isinstance(u,list): print('Failed:'+em); continue
    uid=u[0]['id']
    sb(\"INSERT INTO public.profiles (id,email,full_name,account_type,portal_role,company_id) VALUES ('\"+uid+\"','\"+em+\"','\"+nm+\"','contractor','\"+rl+\"','\"+cid+\"') ON CONFLICT (id) DO UPDATE SET portal_role='\"+rl+\"',company_id='\"+cid+\"',account_type='contractor'\")
    body='Dear '+nm+',\n\nYou have been added to the Lolo Travels partner portal.\n\nPortal: https://lolotravels.com/contractor\nEmail: '+em+'\nTemp Password: '+pw+'\nAccess: '+rl+'\n\nUse Forgot Password to set your own.\n\nLolo Travels LLC'
    sent=requests.post('https://api.resend.com/emails',headers={'Authorization':'Bearer '+R,'Content-Type':'application/json'},json={'from':'Lolo Travels <hello@lolotravels.com>','to':[em],'subject':'Your Lolo Travels Portal Access','text':body}).status_code==200
    sb(\"UPDATE public.team_invitations SET status='\"+('sent' if sent else 'created')+\"',temp_password='\"+pw+\"',processed_at=now() WHERE id='\"+iid+\"'\")
    print('Done:'+em)
"
