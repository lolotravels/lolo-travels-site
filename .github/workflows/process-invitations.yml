name: Process Team Invitations
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Process pending invitations
        run: |
          pip install requests -q
          python3 - <<SCRIPT
import requests, json, random, string, os

SB_TOKEN = "sbp_ccc9e305a2bb114419b00eb7e5145e5f18e602a7"
SB_PROJECT = "hktntiamtpptcagnohnn"
RESEND_KEY = "re_jGpYApUS_L9hHGhCwhWKEJanp8dwpp3UA"

def sb(sql):
    r = requests.post(
        f"https://api.supabase.com/v1/projects/{SB_PROJECT}/database/query",
        headers={"Authorization": f"Bearer {SB_TOKEN}", "Content-Type": "application/json"},
        json={"query": sql}
    )
    return r.json()

def send_email(to_email, to_name, role, temp_pw, company_name):
    role_labels = {"owner":"Owner","manager":"Manager","compliance":"Compliance","finance":"Finance","sales":"Sales","operations":"Operations"}
    role_label = role_labels.get(role, role.capitalize())
    body = f"Dear {to_name},\n\nYou have been added to the Lolo Travels partner portal for {company_name}.\n\nPortal URL: https://lolotravels.com/contractor\nEmail: {to_email}\nTemporary Password: {temp_pw}\nAccess Level: {role_label}\n\nPlease sign in and use the Forgot Password link to set your own password.\n\nIf you have questions contact accountmanager@lolotravels.com.\n\nWarm regards,\nLolo Travels LLC"
    r = requests.post(
        "https://api.resend.com/emails",
        headers={"Authorization": f"Bearer {RESEND_KEY}", "Content-Type": "application/json"},
        json={"from": "Lolo Travels <hello@lolotravels.com>", "to": [to_email], "subject": f"Your Lolo Travels Partner Portal Access - {company_name}", "text": body}
    )
    return r.status_code == 200

invitations = sb("SELECT ti.*, c.name as company_name FROM public.team_invitations ti LEFT JOIN public.companies c ON c.id = ti.company_id WHERE ti.status = \'pending\' ORDER BY ti.created_at LIMIT 10")
if not isinstance(invitations, list):
    print("No pending invitations or error:", invitations)
    exit(0)

for inv in invitations:
    inv_id = inv["id"]
    email = inv["invitee_email"]
    name = inv.get("invitee_name") or email.split("@")[0]
    role = inv.get("portal_role") or "sales"
    company_id = inv["company_id"]
    company_name = inv.get("company_name") or "Your Company"
    chars = string.ascii_letters + string.digits
    temp_pw = "Lolo" + "".join(random.choices(chars, k=6)) + "!"
    existing = sb(f"SELECT id FROM auth.users WHERE email = \'{email}\'")
    if not existing:
        sb(f"INSERT INTO auth.users (id, email, encrypted_password, email_confirmed_at, role, aud, created_at, updated_at) VALUES (uuid_generate_v4(), \'{email}\', crypt(\'{temp_pw}\', gen_salt(\'bf\')), now(), \'authenticated\', \'authenticated\', now(), now())")
    else:
        sb(f"UPDATE auth.users SET encrypted_password = crypt(\'{temp_pw}\', gen_salt(\'bf\')) WHERE email = \'{email}\'")
    user = sb(f"SELECT id FROM auth.users WHERE email = \'{email}\'")
    if not user or not isinstance(user, list):
        continue
    user_id = user[0]["id"]
    sb(f"INSERT INTO public.profiles (id, email, full_name, account_type, portal_role, company_id) VALUES (\'{user_id}\', \'{email}\', \'{name}\', \'contractor\', \'{role}\', \'{company_id}\') ON CONFLICT (id) DO UPDATE SET portal_role = \'{role}\', company_id = \'{company_id}\', account_type = \'contractor\'")
    sent = send_email(email, name, role, temp_pw, company_name)
    status = "sent" if sent else "created"
    sb(f"UPDATE public.team_invitations SET status = \'{status}\', temp_password = \'{temp_pw}\', processed_at = now() WHERE id = \'{inv_id}\'")
    print(f"Processed {email} - {status}")

SCRIPT